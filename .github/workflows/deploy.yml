name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy.yml'

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Static Site
        run: |
          cd frontend
          npm run build
        env:
          NEXT_PUBLIC_API_URL: https://trd-lex-backend-placeholder.run.app # ใส่ URL Backend จริงกรณีขึ้นโปรดักชัน

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend/out # โฟลเดอร์ที่ได้จากการ export ของ Next.js
          branch: gh-pages # บรันช์ปลายทางสำหรับแสดงผลเว็บ GitHub Pages
          clean: true
