version: '3.8'

services:
  # ===========================
  # PostgreSQL Database
  # ===========================
  db:
    image: postgres:16-alpine
    container_name: trd_lex_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-trd_lex}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - trd-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================
  # pgAdmin (Database GUI)
  # ===========================
  pgadmin:
    image: dpage/pgadmin4
    container_name: trd_lex_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@trd.go.th}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin1234}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    networks:
      - trd-network

  # ===========================
  # FastAPI Backend
  # ===========================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trd_lex_backend
    restart: always
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-trd_lex}?schema=public"
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_trd_lex_2026_change_me}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      API_VERSION: ${API_VERSION:-v1}
    ports:
      - "8002:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - trd-network

  # ===========================
  # Next.js Frontend
  # ===========================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trd_lex_frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8002
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - trd-network

volumes:
  postgres_data:
  pgadmin_data:

networks:
  trd-network:
    driver: bridge
